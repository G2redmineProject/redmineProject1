<!doctype html>
<html
  xmlns:th="https://www.thymeleaf.org/"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{common/layouts/default_layout}"
  layout:fragment="Content"
>
  <head>
    <meta charset="UTF-8" />
    <title>일정 관리</title>

    <link
      rel="stylesheet"
      href="https://docs.dhtmlx.com/gantt/codebase/dhtmlxgantt.css"
    />
    <link rel="stylesheet" th:href="@{/css/gantt/style.css}" />
  </head>

  <body>
    <div class="gantt-page">
      <div class="x-page-title">
        <h3 class="page-title">일정 관리</h3>
        <div class="page-title-sub">일정 관리 페이지입니다.</div>
      </div>
      <div id="e7eGantt" class="gantt-wrapper"></div>
    </div>

    <script src="https://docs.dhtmlx.com/gantt/codebase/dhtmlxgantt.js"></script>
    <script>
      gantt.init("e7eGantt");

      window.addEventListener("load", () => {
        gantt.init("e7eGantt");
        gantt.setSizes();
      });

      window.addEventListener("resize", () => {
        gantt.setSizes();
      });

      function calculateResourceLoad(tasks, scale) {
        var step = scale.unit;
        var timegrid = {};

        for (var i = 0; i < tasks.length; i++) {
          var task = tasks[i];

          var currDate = gantt.date[step + "_start"](new Date(task.start_date));

          while (currDate < task.end_date) {
            var date = currDate;
            currDate = gantt.date.add(currDate, 1, step);

            if (
              !gantt.isWorkTime({
                date: date,
                task: task,
              })
            ) {
              continue;
            }

            var timestamp = date.valueOf();
            if (!timegrid[timestamp]) timegrid[timestamp] = 0;

            timegrid[timestamp] += 8;
          }
        }

        var timetable = [];
        var start, end;
        for (var i in timegrid) {
          start = new Date(i * 1);
          end = gantt.date.add(start, 1, step);
          timetable.push({
            start_date: start,
            end_date: end,
            value: timegrid[i],
          });
        }

        return timetable;
      }

      var renderResourceLine = function (resource, timeline) {
        var tasks = gantt.getTaskBy("user", resource.id);
        var timetable = calculateResourceLoad(tasks, timeline.getScale());

        var row = document.createElement("div");

        for (var i = 0; i < timetable.length; i++) {
          var day = timetable[i];

          var css = "";
          if (day.value <= 8) {
            css = "gantt_resource_marker gantt_resource_marker_ok";
          } else {
            css = "gantt_resource_marker gantt_resource_marker_overtime";
          }

          var sizes = timeline.getItemPosition(
            resource,
            day.start_date,
            day.end_date,
          );
          var el = document.createElement("div");
          el.className = css;

          el.style.cssText = [
            "left:" + sizes.left + "px",
            "width:" + sizes.width + "px",
            "position:absolute",
            "height:" + (gantt.config.row_height - 1) + "px",
            "line-height:" + sizes.height + "px",
            "top:" + sizes.top + "px",
          ].join(";");

          el.innerHTML = day.value;
          row.appendChild(el);
        }
        return row;
      };

      var resourceLayers = [renderResourceLine, "taskBg"];

      // 색깔 에디터 추가
      let editor;
      gantt.config.editor_types.color = {
        show: function (id, column, config, placeholder) {
          var html =
            "<div><input type='color' name='" + column.name + "'></div>";
          placeholder.innerHTML = html;

          editor = $(placeholder)
            .find("input")
            .spectrum({
              change: () => {
                gantt.ext.inlineEditors.save();
              },
            });

          setTimeout(() => {
            editor.spectrum("show");
          });
        },
        hide: function () {
          if (editor) {
            editor.spectrum("destroy");
            editor = null;
          }
        },

        set_value: function (value, id, column, node) {
          editor.spectrum("set", value);
        },

        get_value: function (id, column, node) {
          return editor.spectrum("get").toHexString();
        },

        is_changed: function (value, id, column, node) {
          // console.log("THIS: ", this);
          var newValue = this.get_value(id, column, node);
          return newValue !== value;
        },

        is_valid: function (value, id, column, node) {
          var newValue = this.get_value(id, column, node);
          return !!newValue;
        },

        save: function (id, column, node) {
          // only for inputs with map_to:auto. complex save behavior goes here
        },
        focus: function (node) {
          editor.spectrum("show");
        },
      };

      const colorEditor = {
        type: "color",
        map_to: "color",
      };

      var mainGridConfig = {
        columns: [
          { name: "text", tree: true, width: 200, label: "작업명" },

          { name: "priority", label: "우선순위", align: "center", width: 70 },

          { name: "status_name", label: "상태", align: "center", width: 70 },

          {
            name: "progress",
            label: "진척도",
            align: "center",
            width: 60,
            template: (t) => Math.round((t.progress || 0) * 100) + "%",
          },

          { name: "started_at", label: "시작일", align: "center", width: 110 },

          { name: "resolved_at", label: "종료일", align: "center", width: 110 },

          {
            name: "assignee_name",
            label: "작업자",
            align: "center",
            width: 80,
          },
          { name: "add", width: 44 },
        ],
      };

      var resourcePanelConfig = {
        columns: [
          {
            name: "name",
            label: "Name",
            align: "center",
            template: function (resource) {
              //console.log("체킁:", resource);
              return resource.label;
            },
          },
          {
            name: "workload",
            label: "Workload",
            align: "center",
            template: function (resource) {
              var tasks = gantt.getTaskBy("user", resource.id);

              var totalDuration = 0;
              for (var i = 0; i < tasks.length; i++) {
                totalDuration += tasks[i].duration;
              }

              return (totalDuration || 0) * 8 + "";
            },
          },
        ],
      };

      gantt.config.layout = {
        css: "gantt_container",
        rows: [
          {
            cols: [
              {
                view: "grid",
                group: "grids",
                config: mainGridConfig,
                scrollY: "scrollVer",
              },
              {
                resizer: true,
                width: 1,
                group: "vertical",
              },
              {
                view: "timeline",
                id: "timeline",
                scrollX: "scrollHor",
                scrollY: "scrollVer",
              },
              {
                view: "scrollbar",
                id: "scrollVer",
                group: "vertical",
              },
            ],
          },
          {
            view: "scrollbar",
            id: "scrollHor",
          },
        ],
      };

      var resourcesStore = gantt.createDatastore({
        name: "resources",
        initItem: function (item) {
          item.id = item.key || gantt.uid();
          return item;
        },
      });

      var tasksStore = gantt.getDatastore("task");
      //console.log("체킁taskStore:", tasksStore);
      tasksStore.attachEvent("onStoreUpdated", function (id, item, mode) {
        resourcesStore.refresh();
      });

      // 기본 설정
      gantt.i18n.setLocale("kr");

      gantt.config.scales = [
        {
          unit: "month",
          step: 1,
          format: "%Y, %F",
        },
        {
          unit: "day",
          step: 1,
          format: "%j, %D",
        },
      ];

      //날짜 형식
      gantt.config.date_format = "%Y-%m-%d %H:%i"; // 실제 전달되는 데이타의 start_date등의 포맷
      gantt.config.task_date = "%Y년 %m월 %d일";

      resourcesStore.parse([
        // resources
        {
          key: "0",
          label: "없음",
        },
        {
          key: "1",
          label: "E7E",
        },
        {
          key: "2",
          label: "메롱",
        },
        {
          key: "3",
          label: "황당",
        },
        {
          key: "4",
          label: "당황",
        },
        {
          key: "5",
          label: "우앙",
        },
        {
          key: "6",
          label: "오호",
        },
        {
          key: "7",
          label: "눈물",
        },
      ]);

      // 비동기 데이터 가져오기
      const fData = async () => {
        try {
          let response = await fetch("http://localhost:8080/ganttData");
          let rawData = await response.json();

          // 프로젝트별로 그룹화
          let projectMap = new Map();

          rawData.forEach((item) => {
            if (!projectMap.has(item.PROJECT_CODE)) {
              projectMap.set(item.PROJECT_CODE, {
                projectName: item.PROJECT_NAME,
                issues: [],
              });
            }
            projectMap.get(item.PROJECT_CODE).issues.push(item);
          });

          // dhtmlxGantt 형식으로 데이터 변환
          let transformedData = {
            data: [],
            links: [],
          };

          // 프로젝트와 일감을 트리 구조로 생성
          projectMap.forEach((project, projectCode) => {
            // 프로젝트 (부모)
            transformedData.data.push({
              id: "project_" + projectCode,
              text: project.projectName,
              start_date: getEarliestDate(project.issues),
              duration: 1,
              progress: 0,
              priority: "",
              status_name: "",
              started_at: "",
              resolved_at: "",
              assignee_name: "",
              user: "0",
              parent: 0,
              open: true, // 기본적으로 펼쳐진 상태
              type: gantt.config.types.project, // 프로젝트 타입
            });

            // 일감들 (자식)
            project.issues.forEach((item) => {
              transformedData.data.push({
                id: item.ISSUE_CODE,
                text: item.TITLE,
                start_date: item.CREATED_ON
                  ? formatDate(item.CREATED_ON)
                  : null,
                duration: 5, // 기본 5일 (필요시 수정)
                progress: item.PROGRESS / 100,
                priority: item.PRIORITY ? item.PRIORITY.trim() : "",
                status_name: item.STATUS ? item.STATUS.trim() : "",
                started_at: item.CREATED_ON
                  ? formatDateOnly(item.CREATED_ON)
                  : "",
                resolved_at: "", // 백엔드에 종료일 필드가 있다면 여기에 추가
                assignee_name: item.ASSIGNEE_NAME || "",
                user: getResourceId(item.ASSIGNEE_NAME),
                parent: "project_" + projectCode, // 부모를 프로젝트로 설정
              });
            });
          });

          gantt.parse(transformedData);
        } catch (error) {
          console.error("데이터 로딩 실패:", error);
        }
      };

      // 날짜 포맷 함수 (gantt용 - YYYY-MM-DD HH:mm)
      function formatDate(dateString) {
        if (!dateString) return null;
        let date = new Date(dateString);
        let year = date.getFullYear();
        let month = String(date.getMonth() + 1).padStart(2, "0");
        let day = String(date.getDate()).padStart(2, "0");
        return `${year}-${month}-${day} 00:00`;
      }

      // 날짜 포맷 함수 (표시용 - YYYY-MM-DD)
      function formatDateOnly(dateString) {
        if (!dateString) return "";
        let date = new Date(dateString);
        let year = date.getFullYear();
        let month = String(date.getMonth() + 1).padStart(2, "0");
        let day = String(date.getDate()).padStart(2, "0");
        return `${year}-${month}-${day}`;
      }

      // 가장 빠른 날짜 찾기
      function getEarliestDate(issues) {
        if (issues.length === 0) return formatDate(new Date());
        let earliest = new Date(issues[0].CREATED_ON);
        issues.forEach((issue) => {
          let date = new Date(issue.CREATED_ON);
          if (date < earliest) earliest = date;
        });
        return formatDate(earliest);
      }

      // 작업자 이름을 리소스 ID로 변환하는 헬퍼 함수
      function getResourceId(assigneeName) {
        if (!assigneeName) return "0";
        if (assigneeName === "김관리") return "1";
        // 필요에 따라 다른 매핑 추가
        return "0";
      }

      fData();
    </script>
  </body>
</html>
