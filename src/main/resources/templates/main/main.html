<!doctype html>
<html xmlns:th="https://www.thymeleaf.org/"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{common/layouts/default_layout}">
<head>
<meta charset="UTF-8" />
<title>Main</title>
<link rel="stylesheet" th:href="@{/css/main/main.css}" />
</head>

<body>
	<div layout:fragment="Content">

		<!--  타이틀 -->
		<div class="x-page-title">
			<h3 class="page-title">메인 페이지</h3>
			<div class="page-title-sub">환영합니다.</div>
		</div>

		<!-- 2x2 대신: 상단 2컬럼 + 하단 2컬럼(카드 높이 균일) -->
		<div class="main-grid">

			<!-- 1) 프로젝트 현황 (도넛) -->
			<div class="card main-card">
				<div
					class="card-header d-flex align-items-center justify-content-between">
					<div>
						<i class="fas fa-chart-pie me-1"></i>프로젝트 현황
					</div>
					<div class="text-muted small">상태별 프로젝트 수</div>
				</div>
				<div class="card-body p-0">
					<div class="chart-wrap">
						<div id="donutchart" class="chart-box"></div>
					</div>
				</div>
			</div>

			<!-- 2) 일감현황 (프로젝트별) -->
			<div class="card main-card">
				<div
					class="card-header d-flex align-items-center justify-content-between">
					<div>
						<i class="fas fa-table me-1"></i>일감현황
					</div>
					<div class="text-muted small">프로젝트별 신규/진행/해결/반려/완료</div>
				</div>

				<div class="card-body p-0">
					<div class="table-responsive main-table-wrap">
						<table class="table table-hover align-middle text-center mb-0"
							id="mainIssueTable">
							<thead class="table-light">
								<tr>
									<th style="min-width: 200px;">프로젝트</th>
									<th style="width: 90px;">신규</th>
									<th style="width: 90px;">진행</th>
									<th style="width: 90px;">해결</th>
									<th style="width: 90px;">반려</th>
									<th style="width: 90px;">완료</th>
									<th style="width: 90px;">합계</th>
								</tr>
							</thead>

							<tbody>
								<tr th:each="list : ${ProIssStatusList}"
									th:classappend="${adminProjectList.contains(list.projectCode)} ? 'click-row admin-row' : 'click-row'"
									th:onclick="|location.href='@{/G2main/{projectCode}/issuesStatus(projectCode=${list.projectCode})}'|">
									<td class="text-start"><span class="proj-name"
										th:text="${list.projectName}">프로젝트</span> <span
										class="badge admin-badge ms-2"
										th:if="${adminProjectList.contains(list.projectCode)}">관리자</span>
									</td>

									<td th:text="${list.newIss}">0</td>
									<td th:text="${list.progress}">0</td>
									<td th:text="${list.solution}">0</td>
									<td th:text="${list.returnIss}">0</td>
									<td th:text="${list.completion}">0</td>

									<td class="fw-bold"
										th:text="${list.newIss + list.progress + list.solution + list.returnIss + list.completion}">
										0</td>
								</tr>

								<tr th:if="${#lists.isEmpty(ProIssStatusList)}">
									<td colspan="7" class="text-center text-muted py-3">표시할
										데이터가 없습니다.</td>
								</tr>
							</tbody>
						</table>
					</div>

					<div class="main-hint">
						행을 클릭하면 해당 프로젝트의 일감현황으로 이동합니다. <span class="ms-2">관리자면
							담당자별, 아니면 내 일감현황이 표시됩니다.</span>
					</div>
				</div>
			</div>

			<!-- 3) (아래 왼쪽) 공지사항 -->
			<div class="card main-card">
				<div
					class="card-header d-flex align-items-center justify-content-between">
					<div>
						<i class="fas fa-bullhorn me-1"></i>공지사항
					</div>
					<a class="text-decoration-none small" href="/notice">더보기</a>
				</div>

				<div class="card-body p-0">
					<div class="list-group list-group-flush notice-list">

						<!-- ✅ 공지 데이터 있을 때 -->
						<a th:each="n : ${noticeList}"
							th:href="@{/notice/{id}(id=${n.noticeId})}"
							class="list-group-item list-group-item-action d-flex justify-content-between align-items-start">
							<div class="me-2">
								<div class="notice-title" th:text="${n.title}">공지 제목</div>
								<div class="notice-meta">
									<span th:text="${n.writerName}">관리자</span> <span class="mx-1">·</span>
									<span th:text="${#temporals.format(n.createdAt, 'yyyy-MM-dd')}">2026-02-11</span>
								</div>
							</div> <span class="badge rounded-pill notice-badge"
							th:if="${n.isNew == 'Y'}">NEW</span>
						</a>

						<!-- ✅ 공지 없을 때 -->
						<div class="p-3 text-muted"
							th:if="${noticeList == null or #lists.isEmpty(noticeList)}">
							등록된 공지사항이 없습니다.</div>

					</div>
				</div>
			</div>

			<!-- 4) (아래 오른쪽) 오늘의 진행률 -->
			<div class="card main-card">
				<div
					class="card-header d-flex align-items-center justify-content-between">
					<div>
						<i class="fas fa-chart-line me-1"></i>전체 프로젝트 진행률
					</div>
					<div class="text-muted small">
						<span
							th:text="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}">
							오늘 </span>
					</div>
				</div>

				<div class="card-body d-flex flex-column justify-content-center">

					<!-- 퍼센트 숫자 -->
					<div class="today-rate-value">
						<span th:text="${todayProgressRate}">0</span>%
					</div>

					<!-- 게이지 바 -->
					<div class="progress progress-lg mt-3">
						<div class="progress-bar" role="progressbar"
							th:style="|width:${todayProgressRate}%;|"
							th:attr="aria-valuenow=${todayProgressRate}" aria-valuemin="0"
							aria-valuemax="100"></div>
					</div>

					<div class="text-muted small mt-2 text-center">오늘까지 처리된 일감 기준
						진행률</div>

				</div>
			</div>

		</div>
	</div>

	<th:block layout:fragment="pageScript">
		<script src="https://www.gstatic.com/charts/loader.js"></script>

		<script th:inline="javascript">
  google.charts.load("current", { packages: ["corechart"] });
  google.charts.setOnLoadCallback(initChart);

  let chart, data;

  function initChart() {
    const statusListCnt = /*[[${statusListCnt}]]*/ [];
    const reversed = [...statusListCnt].reverse();

    data = new google.visualization.DataTable();
    data.addColumn("string", "상태");
    data.addColumn("number", "개수");
    data.addColumn({ type: "string", role: "tooltip" });

    reversed.forEach((item) => {
      const value = Number(item.codeNameCnt);
      data.addRow([item.codeName, value, `${item.codeName}: ${value}개`]);
    });

    chart = new google.visualization.PieChart(document.getElementById("donutchart"));
    drawChart();

    // ✅ 리사이즈는 "디바운스"로 한 박자 늦춰서(계산 안정)
    let t;
    window.addEventListener("resize", () => {
      clearTimeout(t);
      t = setTimeout(drawChart, 120);
    });
  }

  function drawChart() {
    const el = document.getElementById("donutchart");
    const w = el.getBoundingClientRect().width;

    const options = {
      pieHole: 0.4,
      colors: ["#3b9ff6", "#a3a3a3"],
      legend: { position: "bottom", textStyle: { fontSize: 13 } },
      pieSliceText: "value",
      pieSliceTextStyle: { fontSize: 16, bold: true },
      // ✅ 컨테이너 폭에 맞춰 chartArea를 픽셀로 재계산
      chartArea: {
      	left: 10,
      	top: 55,
      	width: Math.max(w - 20, 0),
      	height: "70%"   // <- 58~65% 사이에서 취향대로 조절
    	}
    };

    chart.draw(data, options);
  }
</script>

	</th:block>
</body>
</html>
